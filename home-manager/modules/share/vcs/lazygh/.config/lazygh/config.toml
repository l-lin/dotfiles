[[pull_requests.searches]]
label = "My PRs"
command = ["--author", "@me", "--state", "open", "--sort", "updated", "--order", "desc"]

[[pull_requests.searches]]
label = "My reviews"
command = ["--reviewed-by", "@me", "--state", "open", "--sort", "updated", "--order", "desc"]

[[pull_requests.searches]]
label = "Requested"
command = ["--review-requested", "@me", "--limit", "100", "--state", "open", "--sort", "updated", "--order", "desc", "--repo", "doctolib/health-content", "--repo", "doctolib/preventive-continuous-care", "--repo", "doctolib/doctolib", "--repo", "doctolib/patient-account"]

[story_review]
agent_command = ["pi", "--models", "github-copilot/gpt-4.1", "--no-session", "-p", "@{{prompt_file}}"]

[theme]
preset = "system"

[keymaps.global]
open_actions_popup = "alt+a"

[keymaps.actions_popup]
submit_selected_picker = ["alt+enter", "ctrl+s"]

[keymaps.pull_requests]
comment_on_pull_request = "alt+c"
